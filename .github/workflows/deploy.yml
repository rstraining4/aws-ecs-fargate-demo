name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform Action (Plan, Apply, or Destroy)'
        type: choice
        required: true
        default: 'plan'
        options:
          - plan
          - apply
          - destroy

jobs:
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Create ECR repo if not exists (Skip on destroy)
      - name: Create ECR repo if it does not exist
        if: ${{ github.event.inputs.terraform_action != 'destroy' }}
        run: |
          aws ecr describe-repositories --repository-names demo-app-repo || aws ecr create-repository --repository-name demo-app-repo

      # Build and push Docker image (Skip on destroy)
      - name: Build and Push Docker Image
        id: build-image
        if: ${{ github.event.inputs.terraform_action != 'destroy' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG src/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Deploy using Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.6

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        if: ${{ github.event.inputs.terraform_action == 'plan' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: terraform plan -var="container_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        working-directory: terraform

      - name: Terraform Apply
        # Run apply if it's a push to main OR if the user manually selected 'apply'
        if: ${{ github.event_name == 'push' || github.event.inputs.terraform_action == 'apply' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: terraform apply -auto-approve -var="container_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        working-directory: terraform

      - name: Get App URL
        if: ${{ github.event_name == 'push' || github.event.inputs.terraform_action == 'apply' }}
        run: |
          echo "Waiting for the ECS service to reach a steady state (this may take a minute)..."
          aws ecs wait services-stable --cluster ecs-demo-cluster --services ecs-demo-service

          echo "Retrieving the running task ARN..."
          TASK_ARN=$(aws ecs list-tasks --cluster ecs-demo-cluster --service-name ecs-demo-service --desired-status RUNNING --query 'taskArns[0]' --output text)
          
          if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
            echo "Retrieving Network Interface ID for task..."
            ENI_ID=$(aws ecs describe-tasks --cluster ecs-demo-cluster --tasks $TASK_ARN --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" --output text)
            
            echo "Retrieving Public IP for ENI..."
            PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI_ID --query 'NetworkInterfaces[0].Association.PublicIp' --output text)
            
            echo "=================================================="
            echo "🎉 APPLICATION DEPLOYED SUCCESSFULLY! 🎉"
            echo "🔗 Access your app here: http://$PUBLIC_IP:5000"
            echo "=================================================="
            
            # Write to GitHub Step Summary so it shows up nicely on the Actions page
            echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
            echo "**App URL:** [http://$PUBLIC_IP:5000](http://$PUBLIC_IP:5000)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Could not find a running task. Please check the AWS Console."
          fi

      - name: Terraform Destroy
        # Only run if user explicitly selects destroy
        if: ${{ github.event.inputs.terraform_action == 'destroy' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        # We still pass the var to satisfy Terraform variable requirements, even though it's destroying
        run: terraform destroy -auto-approve -var="container_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        working-directory: terraform
