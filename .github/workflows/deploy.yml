name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_build:
        description: 'Build and push Docker image'
        type: boolean
        required: true
        default: true
      run_deploy:
        description: 'Deploy infrastructure with Terraform'
        type: boolean
        required: true
        default: true

jobs:
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Create ECR repo if not exists
      - name: Create ECR repo if it does not exist
        if: ${{ github.event_name == 'push' || github.event.inputs.run_build == 'true' }}
        run: |
          aws ecr describe-repositories --repository-names demo-app-repo || aws ecr create-repository --repository-name demo-app-repo

      # Build and push Docker image
      - name: Build and Push Docker Image
        id: build-image
        if: ${{ github.event_name == 'push' || github.event.inputs.run_build == 'true' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG src/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Deploy using Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        if: ${{ github.event_name == 'push' || github.event.inputs.run_deploy == 'true' }}
        with:
          terraform_version: 1.4.6

      - name: Terraform Init
        if: ${{ github.event_name == 'push' || github.event.inputs.run_deploy == 'true' }}
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        if: ${{ github.event_name == 'push' || github.event.inputs.run_deploy == 'true' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: demo-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: terraform apply -auto-approve -var="container_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        working-directory: terraform
